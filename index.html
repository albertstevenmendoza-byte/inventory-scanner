<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cycle Counter 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7; --surface: #ffffff; --surface-2: #f0f0f3; --surface-3: #e8e8ec; --border: #dcdce2;
            --text: #1a1a1f; --text-2: #6b6b78; --text-3: #9898a6; --accent: #3b6cf5; --accent-glow: rgba(59,108,245,0.08);
            --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0; --red: #dc2626; --red-bg: #fef2f2; --red-border: #fecaca;
            --amber: #d97706; --amber-bg: #fffbeb; --amber-border: #fde68a; --cyan: #0891b2; --radius: 16px; --radius-sm: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        button { font-family: inherit; border: none; cursor: pointer; }
        .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .screen.active { display: flex; }
        .app-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .sync-dot.queued { background: var(--amber); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .setup-hero { text-align: center; padding: 48px 32px; }
        .setup-hero .icon { font-size: 56px; margin-bottom: 16px; }
        .aisle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 16px 20px; }
        .aisle-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px 0; text-align: center; font-size: 24px; font-weight: 900; position: relative; overflow: hidden; }
        .aisle-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(79,125,249,0.12), transparent); transition: height 0.5s; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .primary-btn { width: 100%; padding: 18px; border-radius: var(--radius); font-size: 14px; font-weight: 800; text-transform: uppercase; background: var(--accent); color: white; }
        .secondary-btn { flex: 1; padding: 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 800; background: var(--surface-2); color: var(--text-2); }
        .secondary-btn.active { border: 1.5px solid var(--accent); color: var(--accent); }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 100px; }
    </style>
</head>
<body>
<div id="toast" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:1000; padding:12px 24px; border-radius:20px; color:white; font-weight:800; display:none;"></div>

<!-- SCREEN: SETUP -->
<div id="screen-setup" class="screen active">
    <div class="app-header">
        <h1 style="font-size: 16px; font-weight: 900;">Cycle Counter</h1>
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="sync-dot" class="sync-dot"></div>
            <button id="name-display" style="font-size: 11px; font-weight: 800; color: var(--text-2); background: var(--surface-2); padding: 6px 12px; border-radius: 8px;">Floor Team</button>
        </div>
    </div>
    <div class="scroll-area">
        <div id="setup-loading" class="setup-hero"><div class="icon">📡</div><h2>Syncing...</h2></div>
        <div id="setup-ready" style="display:none;">
            <div style="padding: 20px 16px 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-3); letter-spacing: 1px;">Select Aisle</div>
            <div class="aisle-grid" id="aisle-grid"></div>
        </div>
    </div>
    <div class="bottom-bar">
        <button onclick="switchScreen('setup')" class="secondary-btn active">Count</button>
        <button onclick="switchScreen('report')" class="secondary-btn">Report</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw_huXZUnTzHzTbcdPLG8xga_bwgfsB6SS0wL_e6dyIiDSrKpaHYK4qikcoX-OhHNxg/exec";
    let sapMaster = [], auditorName = localStorage.getItem('auditorName') || 'Floor User';
    
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('screen-' + id);
        if(target) target.classList.add('active');
        
        document.querySelectorAll('.secondary-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(id));
        });
    }

    async function pullCloudData() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            sapMaster = data.inventory || [];
            showSetupReady();
        } catch (e) {
            console.error("Sync Error:", e);
            showSetupReady(); // Still show interface even on error
        }
    }

    function showSetupReady() {
        document.getElementById('setup-loading').style.display = 'none';
        document.getElementById('setup-ready').style.display = 'block';
        buildAisleGrid();
    }

    function buildAisleGrid() {
        const grid = document.getElementById('aisle-grid');
        grid.innerHTML = '';
        "ABCDEFGHJKLMNP".split("").forEach(row => {
            const btn = document.createElement('button');
            btn.className = 'aisle-btn';
            btn.innerHTML = `<div class="aisle-fill" style="height:0%"></div><span style="position:relative;">${row}</span>`;
            btn.onclick = () => toast(`Aisle ${row} selected`, "#3b6cf5");
            grid.appendChild(btn);
        });
    }

    function toast(msg, color) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = color;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    window.onload = () => {
        document.getElementById('name-display').innerText = auditorName;
        pullCloudData();
        setInterval(pullCloudData, 30000);
    };
</script>
</body>
</html>
