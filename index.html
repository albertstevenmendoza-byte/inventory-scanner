<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP Auditor | Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        input[type="number"], input[type="text"] { font-size: 16px !important; }
        .card-verified { border-left: 8px solid #22c55e; background-color: #f0fdf4; }
        .card-missing { border-left: 8px solid #ef4444; background-color: #fef2f2; opacity: 0.8; }
        .card-extra { border-left: 8px solid #a855f7; background-color: #f5f3ff; }
        .card-error { border: 2px solid #ef4444 !important; animation: shake 0.2s ease-in-out 0s 2; }
        .nav-active { background-color: #3b82f6; color: white; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        @media print { .no-print { display: none; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-3 shadow-lg shrink-0 no-print">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                </div>
                <h1 class="text-lg font-black uppercase tracking-tighter">SAP Auditor</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="clearAllData()" class="text-slate-400 p-2 text-[10px] uppercase font-bold border border-slate-700 rounded-lg active:bg-red-600 active:text-white transition-colors">Reset App</button>
            </div>
        </div>
        <div id="data-status" class="text-[9px] text-center text-slate-500 font-bold uppercase mt-2 tracking-widest">System Offline</div>
    </header>

    <!-- Nav Tabs -->
    <nav class="bg-white border-b flex p-1 no-print shrink-0">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-xs font-black uppercase tracking-widest transition-all nav-active rounded-l-lg">Audit Mode</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-xs font-black uppercase tracking-widest transition-all text-slate-400 bg-slate-50 rounded-r-lg">Live Report</button>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- STARTUP OVERLAY -->
        <div id="setup-screen" class="absolute inset-0 bg-slate-100 z-40 flex flex-col p-6 overflow-y-auto">
            <div id="upload-prompt" class="flex-1 flex flex-col items-center justify-center text-center">
                <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center mb-6 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <h2 class="text-2xl font-black uppercase text-slate-800 mb-2">Data Required</h2>
                <p class="text-slate-500 text-sm mb-8 max-w-[240px]">Upload the <b>SAP Physical Stock</b> export to begin.</p>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="w-full max-w-xs bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all cursor-pointer block">Select Excel File</label>
            </div>
            <div id="row-selection" class="hidden">
                <h2 class="text-2xl font-black uppercase mb-2 text-slate-800">Select Row</h2>
                <p class="text-slate-500 text-sm mb-6 font-bold uppercase">Choose a row to begin auditing.</p>
                <div class="grid grid-cols-4 gap-3" id="row-grid"></div>
            </div>
        </div>

        <!-- SMART BIN INPUT -->
        <div class="p-3 bg-white border-b shadow-sm shrink-0">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="bg-slate-200 text-slate-600 px-4 rounded-xl font-black">◀</button>
                <input type="text" id="bin-input" placeholder="TYPE/SCAN BIN..." autocomplete="off"
                       class="flex-1 p-4 bg-slate-100 border-2 border-slate-200 rounded-xl text-xl font-black text-blue-700 uppercase focus:border-blue-500 outline-none"
                       oninput="suggestBins(this.value)">
                <button onclick="stepBin(1)" class="bg-slate-200 text-slate-600 px-4 rounded-xl font-black">▶</button>
            </div>
            <div id="bin-suggestions" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1"></div>
        </div>

        <!-- LIST AREA -->
        <div id="audit-list" class="flex-1 overflow-y-auto p-3 space-y-3 pb-56"></div>

        <!-- STICKY FOOTER -->
        <div class="fixed bottom-0 left-0 right-0 bg-slate-900 p-3 shadow-[0_-4px_20px_rgba(0,0,0,0.3)] no-print z-50">
            <div class="flex gap-2 mb-3">
                <button onclick="toggleAddForm()" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-lg">+ Found Item</button>
                <button onclick="finalizeBin()" class="flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl font-black uppercase text-[10px] border border-slate-600">Mark Bin Empty</button>
            </div>
            <div class="flex items-center justify-between gap-4">
                <div class="text-white">
                    <p class="text-[8px] uppercase text-slate-400 font-bold">Bins Done</p>
                    <p id="stat-bins-done" class="text-xl font-black leading-none">0</p>
                </div>
                <button onclick="finalizeBin()" class="flex-1 bg-green-600 text-white py-4 rounded-xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Finalize & Next Bin</button>
            </div>
        </div>
    </main>

    <!-- ROW FINISHED MODAL -->
    <div id="row-end-modal" class="hidden fixed inset-0 bg-slate-900/95 z-[70] p-6 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 class="text-2xl font-black uppercase mb-2">Row Complete!</h2>
            <p id="row-end-text" class="text-slate-500 font-bold mb-6 text-sm"></p>
            <div class="space-y-3">
                <button id="btn-next-row" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Continue to Next Row</button>
                <button onclick="openRowSelector()" class="w-full bg-white border-2 border-blue-600 text-blue-600 py-4 rounded-2xl font-black uppercase text-xs">Navigate to Different Row</button>
                <button onclick="switchView('report'); document.getElementById('row-end-modal').classList.add('hidden')" class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-black uppercase text-xs">Finish & View Report</button>
            </div>
        </div>
    </div>

    <!-- REPORT VIEW -->
    <main id="view-report" class="hidden flex-1 flex flex-col overflow-hidden p-3 space-y-3">
        <div class="flex gap-1 overflow-x-auto pb-2 no-print shrink-0 no-scrollbar">
            <button onclick="filterReport('move')" id="f-move" class="whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-black uppercase bg-white border border-slate-200 shadow-sm">Movements</button>
            <button onclick="filterReport('adj')" id="f-adj" class="whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-black uppercase bg-white border border-slate-200 shadow-sm">Adjustments</button>
            <button onclick="filterReport('inactive')" id="f-inactive" class="whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-black uppercase bg-white border border-slate-200 shadow-sm">Extra Items</button>
            <button onclick="filterReport('missing')" id="f-missing" class="whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-black uppercase bg-white border border-slate-200 shadow-sm">Missing</button>
        </div>
        <div class="flex-1 overflow-y-auto space-y-3" id="report-body"></div>
        <div class="bg-white p-4 rounded-2xl shadow-xl border border-slate-200 no-print space-y-3">
            <div class="flex items-center gap-2">
                <input type="text" id="email-user" placeholder="Novus Username" class="flex-1 p-3 border rounded-xl bg-slate-50 font-bold text-blue-700 outline-none">
                <span class="text-xs font-bold text-slate-500">@novusfoods.com</span>
            </div>
            <button onclick="sendEmailReport()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-sm shadow-md">Email Report</button>
        </div>
    </main>

    <!-- MODAL: ADD EXTRA ITEM -->
    <div id="add-item-modal" class="hidden fixed inset-0 bg-slate-900/90 z-[60] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4">
            <h2 class="text-xl font-black uppercase text-slate-800">Add Physical Item</h2>
            <div class="space-y-3">
                <input type="text" id="add-hu" placeholder="HU Number" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" oninput="autoLookupExtra(this)">
                <input type="text" id="add-prod" placeholder="Product ID" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none">
                <input type="number" id="add-qty" placeholder="Physical Count" class="w-full p-5 bg-blue-50 rounded-xl font-black text-center text-2xl text-blue-700 outline-none">
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="toggleAddForm()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-xs">Cancel</button>
                <button onclick="submitExtra()" class="flex-[2] bg-orange-500 text-white py-4 rounded-xl font-black uppercase shadow-lg">Confirm Add</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA STATE ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
        }

        window.onload = () => {
            initSetupGrid();
            if (sapMasterData.length > 0) unlockAudit();
            if (currentActiveBin) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('bin-input').value = currentActiveBin;
                renderAuditList();
                suggestBins("");
            }
            document.getElementById('stat-bins-done').innerText = binsAudited.size;
        };

        function initSetupGrid() {
            const grid = document.getElementById('row-grid');
            grid.innerHTML = "";
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-slate-200 p-4 rounded-2xl font-black text-xl text-blue-600 shadow-sm active:bg-blue-600 active:text-white";
                btn.innerText = row;
                btn.onclick = () => startAuditAtRow(row);
                grid.appendChild(btn);
            });
        }

        function unlockAudit() {
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
            document.getElementById('data-status').innerText = `ONLINE: ${sapMasterData.length} SKU`;
            document.getElementById('data-status').className = "text-[9px] text-center text-green-500 font-bold uppercase mt-2 tracking-widest";
        }

        function startAuditAtRow(rowLetter) {
            document.getElementById('setup-screen').classList.add('hidden');
            selectBin(`W${rowLetter}00A`);
        }

        function openRowSelector() {
            document.getElementById('row-end-modal').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('row-selection').classList.remove('hidden');
        }

        function clearAllData() { 
            if (confirm("⚠️ WARNING: This will permanently delete all SAP data and progress. Reset?")) { 
                localStorage.clear(); location.reload(); 
            } 
        }

        // --- COORDINATE LOGIC ---
        function getNextPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) {
                let nextRow = String.fromCharCode(row.charCodeAt(0) + 1);
                return nextRow > 'P' ? null : `W${nextRow}00A`;
            }
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'A') level = 'B';
            else if (level === 'B') level = 'C';
            else {
                if (bay >= 39) return `W${row}100`;
                else { level = 'A'; bay++; }
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function getPrevPhysicalBin(current) {
            if (!current) return null;
            let row = current.charAt(1);
            if (current.endsWith("100")) return `W${row}39C`;
            let bay = parseInt(current.substring(2, 4));
            let level = current.charAt(4);
            if (level === 'C') level = 'B';
            else if (level === 'B') level = 'A';
            else {
                if (bay === 0) return null;
                level = 'C'; bay--;
            }
            return `W${row}${bay.toString().padStart(2, '0')}${level}`;
        }

        function stepBin(dir) {
            const next = dir > 0 ? getNextPhysicalBin(currentActiveBin) : getPrevPhysicalBin(currentActiveBin);
            if (next) selectBin(next);
        }

        function suggestBins(val) {
            const container = document.getElementById('bin-suggestions');
            container.innerHTML = "";
            if (currentActiveBin) {
                const bayPrefix = currentActiveBin.substring(0, 4);
                ['A', 'B', 'C'].forEach(lvl => {
                    const btn = document.createElement('button');
                    btn.className = `px-6 py-2 rounded-lg font-black text-sm border shrink-0 ${currentActiveBin.endsWith(lvl) && !currentActiveBin.endsWith("100") ? 'bg-blue-600 text-white border-blue-700' : 'bg-white text-blue-600 border-blue-200'}`;
                    btn.innerText = lvl;
                    btn.onclick = () => selectBin(bayPrefix + lvl);
                    container.appendChild(btn);
                });
                const floorBtn = document.createElement('button');
                floorBtn.className = `px-6 py-2 rounded-lg font-black text-sm border shrink-0 ${currentActiveBin.endsWith("100") ? 'bg-orange-500 text-white border-orange-600' : 'bg-orange-50 text-orange-600 border-orange-200'}`;
                floorBtn.innerText = "100 (Floor)";
                floorBtn.onclick = () => selectBin(`W${currentActiveBin.charAt(1)}100`);
                container.appendChild(floorBtn);
            }
        }

        function selectBin(binName) {
            document.getElementById('bin-input').value = binName;
            loadBinData(binName);
            suggestBins("");
        }

        function loadBinData(binVal) {
            currentActiveBin = binVal.toUpperCase();
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            saveSession(); renderAuditList();
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            let errors = false;
            currentBinItems.forEach((item, index) => {
                const card = document.getElementById(`card-${index}`);
                if ((item.verified && item.countQty <= 0) || (!item.verified && !item.isMissing)) {
                    card.classList.add('card-error'); errors = true;
                }
            });
            if (errors) return;
            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            const nextBin = getNextPhysicalBin(currentActiveBin);
            if (currentActiveBin.endsWith("100")) {
                showRowEndPrompt(currentActiveBin.charAt(1), nextBin);
            } else if (nextBin) {
                selectBin(nextBin);
            }
            document.getElementById('stat-bins-done').innerText = binsAudited.size;
            saveSession(); renderAuditList(); window.scrollTo(0,0);
        }

        function showRowEndPrompt(finishedRow, nextBin) {
            const modal = document.getElementById('row-end-modal');
            const text = document.getElementById('row-end-text');
            const nextBtn = document.getElementById('btn-next-row');
            text.innerText = `Row ${finishedRow} complete.`;
            if (nextBin) {
                nextBtn.innerText = `Continue to Row ${nextBin.charAt(1)}`;
                nextBtn.onclick = () => { modal.classList.add('hidden'); selectBin(nextBin); };
                nextBtn.classList.remove('hidden');
            } else { nextBtn.classList.add('hidden'); }
            modal.classList.remove('hidden');
        }

        function quickConfirm(idx) {
            currentBinItems[idx].countQty = currentBinItems[idx].sapQty;
            currentBinItems[idx].verified = true;
            currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function adjustQty(idx, delta) {
            let current = currentBinItems[idx].countQty || 0;
            currentBinItems[idx].countQty = Math.max(0, current + delta);
            currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0);
            if (currentBinItems[idx].verified) currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list');
            container.innerHTML = "";
            if (currentBinItems.length === 0 && currentActiveBin !== "") {
                container.innerHTML = `<div class="p-10 text-center text-slate-400 italic text-xs uppercase font-black">Bin empty in SAP</div>`;
            }
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = `p-4 rounded-2xl shadow-md border bg-white transition-all ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : (item.isExtra ? 'card-extra' : ''))}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <span class="inline-block px-2 py-0.5 bg-slate-800 text-white font-mono text-xs rounded mb-2">HU: ${item.hu}</span>
                            <h3 class="text-sm font-black text-slate-800 leading-tight">${item.product}</h3>
                            <p class="text-[10px] text-blue-600 font-bold uppercase mt-0.5 leading-tight">${item.desc}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase">SAP Qty</p>
                            <p class="text-lg font-black text-slate-700">${item.isExtra ? '--' : item.sapQty} <span class="text-[10px]">${item.uom}</span></p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="flex gap-2 items-center">
                            ${!item.isExtra ? `<button onclick="quickConfirm(${index})" class="flex-[2] py-4 bg-green-600 text-white rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition-all">ALL ${item.sapQty}</button>` : ''}
                            <button onclick="toggleMissing(${index})" class="flex-1 py-4 rounded-xl font-black text-[10px] uppercase border-2 ${item.isMissing ? 'bg-red-600 border-red-600 text-white shadow-inner' : 'border-slate-200 text-slate-400 bg-white shadow-sm'}">Missing</button>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-2xl">
                            <button onclick="adjustQty(${index}, -1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-slate-400">－</button>
                            <input type="number" inputmode="decimal" value="${item.countQty || ''}" oninput="updateCount(${index}, this.value)" placeholder="QTY" class="flex-1 bg-transparent text-center font-black text-xl text-blue-700 outline-none border-none">
                            <button onclick="adjustQty(${index}, 1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-blue-600">＋</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleMissing(idx) { 
            currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; 
            if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } 
            saveSession(); renderAuditList(); 
        }

        function updateCount(idx, val) { 
            currentBinItems[idx].countQty = parseFloat(val) || 0; 
            currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0);
            if(currentBinItems[idx].countQty > 0) currentBinItems[idx].isMissing = false; 
            saveSession();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    desc: row['Product Short Description'] || row['Product short description'] || "",
                    uom: row['Base Unit of Measure'] || "EA",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                saveSession(); unlockAudit();
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleAddForm() { document.getElementById('add-item-modal').classList.toggle('hidden'); }

        function submitExtra() {
            const hu = document.getElementById('add-hu').value.trim();
            const prod = document.getElementById('add-prod').value.trim();
            const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            if(!currentActiveBin || !hu || !prod || qty <= 0) return alert("Fill all fields.");
            const sapMatch = sapMasterData.find(i => i.hu === hu);
            currentBinItems.push({ hu, product: prod, sapQty: sapMatch?sapMatch.sapQty:0, sapBin: sapMatch?sapMatch.sapBin:null, scannedBin: currentActiveBin, countQty: qty, verified: true, isMissing: false, isExtra: true, desc: sapMatch?sapMatch.desc:"NOT IN SAP DATA", uom: sapMatch?sapMatch.uom:"EA" });
            toggleAddForm(); saveSession(); renderAuditList();
        }

        function switchView(view) {
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-active', view === 'report');
            if(view === 'report') filterReport('move');
        }

        function filterReport(type) {
            const container = document.getElementById('report-body');
            container.innerHTML = "";
            
            // UI Button Highlighting
            ['move', 'adj', 'inactive', 'missing'].forEach(id => {
                const btn = document.getElementById('f-' + id);
                if (id === type) {
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.remove('bg-white', 'text-slate-400');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.add('bg-white', 'text-slate-400');
                }
            });

            const combined = [...auditLog, ...currentBinItems];
            let filtered = [];

            if (type === 'move') {
                filtered = combined.filter(i => i.sapBin && i.sapBin !== i.scannedBin && i.verified && !i.isExtra);
            } else if (type === 'adj') {
                filtered = combined.filter(i => i.sapBin === i.scannedBin && i.countQty !== i.sapQty && !i.isMissing && i.verified);
            } else if (type === 'missing') {
                filtered = combined.filter(i => i.isMissing);
            } else if (type === 'inactive') {
                filtered = combined.filter(i => i.isExtra);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-400 text-xs font-bold uppercase">No records found for this category</div>`;
                return;
            }

            filtered.forEach(i => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white rounded-2xl border border-slate-200 shadow-sm space-y-3";
                
                let specificDetail = "";
                if (type === 'move') {
                    specificDetail = `
                        <div class="flex justify-between items-center bg-blue-50 p-2 rounded-lg border border-blue-100">
                            <div><p class="text-[8px] uppercase font-black text-blue-400">SAP Bin</p><p class="font-bold text-slate-700 text-xs">${i.sapBin}</p></div>
                            <div class="text-blue-500 font-bold">➜</div>
                            <div class="text-right"><p class="text-[8px] uppercase font-black text-blue-400">Found In</p><p class="font-bold text-blue-700 text-xs">${i.scannedBin}</p></div>
                        </div>`;
                } else if (type === 'adj') {
                    const diff = i.countQty - i.sapQty;
                    specificDetail = `
                        <div class="flex justify-between items-center bg-orange-50 p-2 rounded-lg border border-orange-100">
                            <div><p class="text-[8px] uppercase font-black text-orange-400">SAP Qty</p><p class="font-bold text-slate-700 text-xs">${i.sapQty}</p></div>
                            <div class="text-right"><p class="text-[8px] uppercase font-black text-orange-400">Counted</p><p class="font-bold text-orange-700 text-xs">${i.countQty} (${diff > 0 ? '+' : ''}${diff})</p></div>
                        </div>`;
                } else if (type === 'missing') {
                    specificDetail = `<div class="bg-red-50 p-2 rounded-lg border border-red-100 text-center"><p class="text-[10px] font-black text-red-600 uppercase">Missing from Bin: ${i.sapBin}</p></div>`;
                } else if (type === 'inactive') {
                    specificDetail = `<div class="bg-purple-50 p-2 rounded-lg border border-purple-100 text-center"><p class="text-[10px] font-black text-purple-600 uppercase">Extra Item Found In Bin: ${i.scannedBin}</p></div>`;
                }

                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <span class="inline-block px-2 py-0.5 bg-slate-100 text-slate-600 font-mono text-[10px] rounded font-bold mb-1 border border-slate-200">HU: ${i.hu}</span>
                            <h4 class="text-xs font-black text-slate-800 leading-tight">${i.product}</h4>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mt-0.5 line-clamp-1">${i.desc}</p>
                        </div>
                        <div class="text-right shrink-0 pl-3">
                             <p class="text-[8px] font-black text-slate-400 uppercase">Final Qty</p>
                             <p class="text-sm font-black text-slate-700 leading-none">${i.countQty} <span class="text-[10px]">${i.uom}</span></p>
                        </div>
                    </div>
                    ${specificDetail}
                `;
                container.appendChild(div);
            });
        }

        function sendEmailReport() {
            const user = document.getElementById('email-user').value.trim();
            if (!user) return alert("Enter username.");
            
            const combined = [...auditLog, ...currentBinItems];
            let body = `SAP AUDIT REPORT - ${new Date().toLocaleString()}\n`;
            body += `==========================================\n\n`;
            
            combined.forEach(i => {
                let status = "OK";
                if (i.isMissing) status = "MISSING";
                else if (i.isExtra) status = "EXTRA ITEM (NOT IN BIN)";
                else if (i.sapBin !== i.scannedBin) status = "LOCATION DISCREPANCY (MOVED)";
                else if (i.sapQty !== i.countQty) status = "QUANTITY DISCREPANCY";

                body += `HU: ${i.hu}\n`;
                body += `PRODUCT: ${i.product} - ${i.desc}\n`;
                body += `STATUS: ${status}\n`;
                body += `SAP LOC: ${i.sapBin || 'NONE'} | PHYSICAL LOC: ${i.scannedBin}\n`;
                body += `SAP QTY: ${i.sapQty} | PHYSICAL QTY: ${i.countQty} ${i.uom}\n`;
                body += `------------------------------------------\n`;
            });

            window.location.href = `mailto:${user}@novusfoods.com?subject=Warehouse Audit Report&body=${encodeURIComponent(body)}`;
        }

        function autoLookupExtra(input) {
            const hu = input.value.trim();
            if (hu.length >= 8) {
                const match = sapMasterData.find(i => i.hu === hu);
                if (match) { 
                    document.getElementById('add-prod').value = match.product; 
                    document.getElementById('add-qty').focus(); 
                }
            }
        }
    </script>
</body>
</html>
