<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP Auditor | Pro Smart-Fill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input[type="number"], input[type="text"] { font-size: 16px !important; }
        
        .card-verified { border-left: 10px solid #10b981; background: linear-gradient(to right, #f0fdf4, #ffffff); }
        .card-missing { border-left: 10px solid #ef4444; background: #fef2f2; opacity: 0.7; }
        .card-extra { border-left: 10px solid #8b5cf6; background: #f5f3ff; }
        .nav-active { background-color: #2563eb; color: white; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); }
        
        #camera-overlay { display: none; position: fixed; inset: 0; background: black; z-index: 200; flex-direction: column; }
        #camera-stream { width: 100%; height: 100%; object-fit: cover; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 300; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        
        .tab-btn-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col h-screen overflow-hidden">

    <div id="toast" class="bg-green-600 text-white px-6 py-3 rounded-full font-black text-xs uppercase shadow-2xl">Bin Saved</div>

    <!-- Header -->
    <header class="bg-slate-900 text-white px-4 py-3 shadow-2xl shrink-0 z-50">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                </div>
                <h1 class="text-sm font-black uppercase tracking-tighter">SAP Auditor</h1>
            </div>
            <button onclick="clearAllData()" class="bg-slate-800 text-slate-400 px-3 py-2 text-[10px] uppercase font-black border border-slate-700 rounded-lg">Reset</button>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white border-b flex p-1.5 shrink-0 gap-1">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest nav-active rounded-xl">Audit Mode</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-50 rounded-xl">Live Report</button>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="absolute inset-0 bg-slate-50 z-[60] flex flex-col p-6 overflow-y-auto">
            <div id="upload-prompt" class="flex-1 flex flex-col items-center justify-center text-center">
                <div class="w-24 h-24 bg-white shadow-2xl rounded-[2.5rem] flex items-center justify-center mb-8 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <h2 class="text-3xl font-black uppercase text-slate-900 mb-2">Upload Data</h2>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="w-full max-w-xs bg-blue-600 text-white py-6 rounded-3xl font-black uppercase text-sm shadow-xl cursor-pointer block">Select Excel File</label>
            </div>
            <div id="row-selection" class="hidden">
                <h2 class="text-2xl font-black uppercase mb-6 text-slate-900">Select Row</h2>
                <div class="grid grid-cols-4 gap-4" id="row-grid"></div>
            </div>
        </div>

        <!-- BIN INPUT -->
        <div class="px-4 py-4 bg-white border-b shadow-sm shrink-0">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="bg-slate-100 text-slate-400 w-12 rounded-2xl font-black">◀</button>
                <input type="text" id="bin-input" placeholder="SCAN BIN..." autocomplete="off"
                       class="flex-1 py-4 px-6 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl mono text-blue-700 uppercase outline-none"
                       onchange="selectBin(this.value)">
                <button onclick="stepBin(1)" class="bg-slate-100 text-slate-400 w-12 rounded-2xl font-black">▶</button>
            </div>
        </div>

        <!-- LIST -->
        <div id="audit-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-64"></div>

        <!-- STICKY FOOTER -->
        <div class="fixed bottom-0 left-0 right-0 glass p-4 shadow-2xl z-50">
            <div class="flex gap-3 mb-4">
                <button onclick="toggleAddForm()" class="flex-1 bg-white border-2 border-orange-500 text-orange-600 py-4 rounded-2xl font-black uppercase text-[11px]">+ Found Item</button>
                <button onclick="openSpyglass()" class="flex-1 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center font-black uppercase text-[11px] gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Spyglass
                </button>
            </div>
            <button onclick="finalizeBin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-transform">Finalize & Next Bin</button>
        </div>
    </main>

    <!-- CAMERA OVERLAY -->
    <div id="camera-overlay">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="absolute inset-x-0 bottom-0 p-8 space-y-8 bg-gradient-to-t from-black/90 to-transparent">
            <input type="range" id="zoom-control" class="w-full h-2 bg-white/20 rounded-lg appearance-none" min="1" max="5" step="0.1" value="1" oninput="handleZoom(this.value)">
            <div class="flex justify-between items-center">
                <button onclick="closeSpyglass()" class="w-16 h-16 rounded-full bg-white/10 text-white flex items-center justify-center border border-white/20">✕</button>
                <button id="freeze-btn-ui" onclick="toggleFreeze()" class="w-20 h-20 rounded-full bg-blue-600 text-white flex items-center justify-center border-4 border-white font-black text-xs">FREEZE</button>
                <button onclick="toggleTorch()" class="w-16 h-16 rounded-full bg-white/10 text-white flex items-center justify-center border border-white/20">💡</button>
            </div>
        </div>
    </div>

    <!-- REPORT VIEW -->
    <main id="view-report" class="hidden flex-1 flex flex-col overflow-hidden">
        <div class="bg-white border-b flex shrink-0 overflow-x-auto no-scrollbar">
            <button onclick="setReportTab('move')" id="tab-move" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase tracking-tighter tab-btn-active">Movements</button>
            <button onclick="setReportTab('adj')" id="tab-adj" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase tracking-tighter text-slate-400">Adjustments</button>
            <button onclick="setReportTab('inactive')" id="tab-inactive" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase tracking-tighter text-slate-400">Inactive HUs</button>
            <button onclick="setReportTab('miss')" id="tab-miss" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase tracking-tighter text-slate-400">Missing</button>
        </div>
        <div id="report-body" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="bg-white p-5 border-t space-y-4 shrink-0">
            <input type="text" id="email-user" placeholder="Novus Username" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-blue-700 uppercase outline-none">
            <button onclick="sendEmailReport()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-sm">Email Report</button>
        </div>
    </main>

    <!-- ADD ITEM MODAL -->
    <div id="add-item-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-5 shadow-2xl">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black uppercase text-slate-900">Physical Find</h2>
                <span id="smart-fill-badge" class="hidden bg-green-100 text-green-600 text-[8px] font-black px-2 py-1 rounded-full animate-pulse uppercase">Smart Filled</span>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">HU Number (Enter 0 if Missing)</label>
                    <input type="text" id="add-hu" placeholder="Scan HU or 0..." class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mono font-bold outline-none focus:border-blue-500" oninput="autoLookupExtra(this)">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Product ID</label>
                        <input type="text" id="add-prod" placeholder="Item #" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Batch</label>
                        <input type="text" id="add-batch" placeholder="Batch" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Physical Count</label>
                    <input type="number" id="add-qty" placeholder="0" class="w-full p-6 bg-blue-50 rounded-2xl font-black text-center text-3xl text-blue-700 outline-none border-2 border-blue-100 focus:border-blue-500">
                </div>
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="toggleAddForm()" class="flex-1 py-4 text-slate-400 font-black uppercase text-[10px]">Cancel</button>
                <button onclick="submitExtra()" class="flex-[2] bg-orange-500 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Confirm Add</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA STATE ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let activeReportTab = 'move';
        
        let videoStream = null;
        let videoTrack = null;
        let isFrozen = false;
        let torchActive = false;

        function haptic() { if (window.navigator.vibrate) window.navigator.vibrate(40); }

        function showToast(msg = "Bin Saved") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
        }

        // --- SMART FILL LOGIC ---
        function autoLookupExtra(input) {
            const hu = input.value.trim();
            const badge = document.getElementById('smart-fill-badge');
            if (hu === "0") { badge.classList.add('hidden'); return; }
            if (hu.length >= 8) {
                const match = sapMasterData.find(i => i.hu === hu);
                if (match) {
                    haptic();
                    document.getElementById('add-prod').value = match.product;
                    document.getElementById('add-batch').value = match.batch || "";
                    badge.classList.remove('hidden');
                    setTimeout(() => document.getElementById('add-qty').focus(), 100);
                } else { badge.classList.add('hidden'); }
            } else { badge.classList.add('hidden'); }
        }

        // --- BIN TRANSITION LOGIC ---
        function selectBin(binName) {
            if (!binName) return;
            currentActiveBin = binName.toUpperCase();
            document.getElementById('bin-input').value = currentActiveBin;
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            saveSession(); renderAuditList(); window.scrollTo(0,0);
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            haptic();
            if (currentBinItems.some(i => !i.verified && !i.isMissing)) { alert("Please address all items."); return; }
            auditLog = auditLog.filter(item => item.scannedBin !== currentActiveBin);
            auditLog.push(...currentBinItems);
            showToast(); saveSession(); stepBin(1);
        }

        function stepBin(dir) {
            if (!currentActiveBin) return;
            let rows = "ABCDEFGHIJKLMNOP", levels = "ABC";
            let rIdx = rows.indexOf(currentActiveBin.charAt(1));
            let bNum = parseInt(currentActiveBin.substring(2, 4));
            let lIdx = levels.indexOf(currentActiveBin.charAt(4));
            if (dir > 0) { lIdx++; if (lIdx > 2) { lIdx = 0; bNum++; if (bNum > 39) { bNum = 0; rIdx++; } } } 
            else { lIdx--; if (lIdx < 0) { lIdx = 2; bNum--; if (bNum < 0) { bNum = 39; rIdx--; } } }
            if (rIdx >= 0 && rIdx < rows.length) selectBin(`W${rows[rIdx]}${bNum.toString().padStart(2, '0')}${levels[lIdx]}`);
        }

        // --- CAMERA ---
        async function openSpyglass() {
            haptic(); document.getElementById('camera-overlay').style.display = 'flex';
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('camera-stream');
                video.srcObject = videoStream; videoTrack = videoStream.getVideoTracks()[0];
            } catch (err) { alert("Camera Error"); closeSpyglass(); }
        }
        function closeSpyglass() { document.getElementById('camera-overlay').style.display = 'none'; if (videoStream) videoStream.getTracks().forEach(t => t.stop()); isFrozen = false; }
        function handleZoom(val) { document.getElementById('camera-stream').style.transform = `scale(${val})`; }
        function toggleFreeze() {
            const v = document.getElementById('camera-stream'); const btn = document.getElementById('freeze-btn-ui');
            if (isFrozen) { v.play(); btn.innerText = "FREEZE"; btn.classList.replace('bg-red-600', 'bg-blue-600'); } 
            else { v.pause(); btn.innerText = "LIVE"; btn.classList.replace('bg-blue-600', 'bg-red-600'); }
            isFrozen = !isFrozen; haptic();
        }
        async function toggleTorch() { if (!videoTrack) return; torchActive = !torchActive; try { await videoTrack.applyConstraints({ advanced: [{ torch: torchActive }] }); } catch(e){} }

        // --- UI ---
        function renderAuditList() {
            const container = document.getElementById('audit-list'); container.innerHTML = "";
            if (currentBinItems.length === 0 && currentActiveBin !== "") { container.innerHTML = `<div class="py-20 text-center text-slate-300 font-black uppercase text-xs tracking-widest">Empty Bin</div>`; return; }
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `p-5 rounded-[2rem] shadow-sm border bg-white transition-all ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : (item.isExtra ? 'card-extra' : ''))}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="inline-block px-3 py-1 bg-slate-900 text-blue-400 mono text-[10px] rounded-lg mb-2">HU: ${item.hu}</span>
                            <h3 class="text-sm font-black text-slate-800 leading-tight mb-1">${item.product}</h3>
                            <p class="text-[11px] text-slate-600 font-semibold mb-1">${item.desc}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">Batch: ${item.batch || 'N/A'}</p>
                        </div>
                        <div class="text-right bg-slate-50 p-2 rounded-xl border border-slate-100 min-w-[70px]">
                            <p class="text-[7px] font-black text-slate-400 uppercase">SAP Qty</p>
                            <p class="text-lg mono font-black text-slate-700">${item.isExtra ? '--' : item.sapQty}</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="flex gap-2">
                            ${!item.isExtra ? `<button onclick="quickConfirm(${index})" class="flex-[3] py-4 bg-emerald-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg">Confirm ${item.sapQty}</button>` : ''}
                            <button onclick="toggleMissing(${index})" class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase border-2 ${item.isMissing ? 'bg-red-600 border-red-600 text-white shadow-lg' : 'border-slate-100 text-slate-300 bg-white'}">Missing</button>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                            <button onclick="adjustQty(${index}, -1)" class="w-14 h-14 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-slate-300">－</button>
                            <input type="number" value="${item.countQty || ''}" oninput="updateCount(${index}, this.value)" placeholder="0" class="flex-1 bg-transparent text-center font-black text-2xl text-blue-700 outline-none">
                            <button onclick="adjustQty(${index}, 1)" class="w-14 h-14 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-blue-600">＋</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function quickConfirm(idx) { haptic(); currentBinItems[idx].countQty = currentBinItems[idx].sapQty; currentBinItems[idx].verified = true; currentBinItems[idx].isMissing = false; saveSession(); renderAuditList(); }
        function adjustQty(idx, delta) { haptic(); let c = currentBinItems[idx].countQty || 0; currentBinItems[idx].countQty = Math.max(0, c + delta); currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0); if(currentBinItems[idx].verified) currentBinItems[idx].isMissing = false; saveSession(); renderAuditList(); }
        function updateCount(idx, val) { currentBinItems[idx].countQty = parseFloat(val) || 0; currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0); saveSession(); }
        function toggleMissing(idx) { haptic(); currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } saveSession(); renderAuditList(); }

        // --- REPORTING ---
        function setReportTab(tab) {
            activeReportTab = tab;
            document.querySelectorAll('#view-report button').forEach(b => {
                b.classList.remove('tab-btn-active', 'text-blue-600');
                if (b.id && b.id.startsWith('tab-')) b.classList.add('text-slate-400');
            });
            document.getElementById(`tab-${tab}`).classList.add('tab-btn-active', 'text-blue-600');
            renderReport();
        }

        function renderReport() {
            const container = document.getElementById('report-body'); container.innerHTML = "";
            const allAudited = [...auditLog]; let displayList = [];

            if (activeReportTab === 'move') {
                // Movements: Scanned bin != SAP bin
                displayList = allAudited.filter(i => i.hu !== "0" && i.sapBin && i.scannedBin !== i.sapBin && !i.isMissing && i.verified);
            } else if (activeReportTab === 'adj') {
                // Adjustments: Scanned qty != SAP qty
                displayList = allAudited.filter(i => i.countQty !== i.sapQty && !i.isMissing && i.verified);
            } else if (activeReportTab === 'inactive') {
                // Inactive: Extra HUs (Not in master) OR HU "0"
                displayList = allAudited.filter(i => i.isExtra && (!sapMasterData.some(m => m.hu === i.hu) || i.hu === "0"));
            } else if (activeReportTab === 'miss') {
                // Missing: Flagged or never scanned
                const auditedHUs = new Set(allAudited.map(a => a.hu));
                const neverScanned = sapMasterData.filter(m => !auditedHUs.has(m.hu)).map(m => ({...m, isMissing: true, desc: "Never Scanned"}));
                displayList = [...allAudited.filter(i => i.isMissing), ...neverScanned];
            }

            if(displayList.length === 0) { container.innerHTML = `<div class="py-20 text-center font-black uppercase text-slate-300 tracking-widest text-[10px]">No Items Found</div>`; return; }

            displayList.forEach(i => {
                const isMoved = i.sapBin && i.scannedBin !== i.sapBin;
                const isAdjusted = i.countQty !== i.sapQty;
                const div = document.createElement('div');
                div.className = "p-4 bg-white rounded-2xl border border-slate-100 shadow-sm";
                
                let status = "";
                if (activeReportTab === 'move') {
                    status = `<p class="text-[10px] text-purple-600 font-black">MOVED: ${i.sapBin} ➔ ${i.scannedBin}</p>`;
                    if (isAdjusted) status += `<p class="text-[8px] text-orange-500 font-black uppercase mt-0.5">⚠️ Also Adjusted (Qty: ${i.countQty} vs ${i.sapQty})</p>`;
                } else if (activeReportTab === 'adj') {
                    status = `<p class="text-[10px] text-orange-600 font-black">ADJUSTED: ${i.countQty} (SAP: ${i.sapQty})</p>`;
                    if (isMoved) status += `<p class="text-[8px] text-purple-500 font-black uppercase mt-0.5">⚠️ Also Moved (From: ${i.sapBin})</p>`;
                } else if (activeReportTab === 'inactive') {
                    status = `<p class="text-[10px] text-blue-600 font-black">${i.hu === "0" ? 'MISSING LABEL / NOT VISIBLE' : 'HU NOT IN SAP'}</p>`;
                } else if (activeReportTab === 'miss') {
                    status = `<p class="text-[10px] text-red-600 font-black">MISSING FROM ${i.sapBin || 'UNKNOWN'}</p>`;
                }

                div.innerHTML = `<p class="text-[10px] font-black mono text-blue-600">HU: ${i.hu}</p>
                                 <p class="text-xs font-bold leading-tight">${i.product}</p>
                                 <p class="text-[10px] text-slate-500 mb-1">${i.desc}</p>${status}`;
                container.appendChild(div);
            });
        }

        // --- DATA ---
        function handleFileUpload(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    batch: String(row['Batch'] || row['Batch Number'] || row['Charg'] || "").trim(),
                    desc: row['Product Short Description'] || row['Product short description'] || row['Description'] || "",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                saveSession(); document.getElementById('upload-prompt').classList.add('hidden'); document.getElementById('row-selection').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(event.target.files[0]);
        }
        function initSetupGrid() {
            const grid = document.getElementById('row-grid');
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-slate-100 p-5 rounded-2xl font-black text-xl active:bg-blue-600 active:text-white";
                btn.innerText = row; btn.onclick = () => { haptic(); document.getElementById('setup-screen').classList.add('hidden'); selectBin(`W${row}00A`); };
                grid.appendChild(btn);
            });
        }
        function switchView(view) { document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit'); document.getElementById('view-report').classList.toggle('hidden', view !== 'report'); if(view === 'report') renderReport(); }
        function clearAllData() { if (confirm("Reset App?")) { localStorage.clear(); location.reload(); } }
        window.onload = () => { initSetupGrid(); if (sapMasterData.length > 0) { document.getElementById('upload-prompt').classList.add('hidden'); document.getElementById('row-selection').classList.remove('hidden'); } if (currentActiveBin) { document.getElementById('setup-screen').classList.add('hidden'); selectBin(currentActiveBin); } };
        function toggleAddForm() { haptic(); document.getElementById('add-item-modal').classList.toggle('hidden'); }
        function submitExtra() {
            const hu = document.getElementById('add-hu').value.trim(); const prod = document.getElementById('add-prod').value.trim();
            const batch = document.getElementById('add-batch').value.trim(); const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            if(!hu || qty <= 0) return;
            const sapMatch = sapMasterData.find(m => m.hu === hu);
            currentBinItems.push({ 
                hu, product: prod, batch, sapQty: sapMatch ? sapMatch.sapQty : 0, 
                sapBin: sapMatch ? sapMatch.sapBin : null, scannedBin: currentActiveBin, 
                countQty: qty, verified: true, isMissing: false, isExtra: true, 
                desc: sapMatch ? sapMatch.desc : (hu === "0" ? "HU NOT VISIBLE / MISSING LABEL" : "PHYSICAL FIND")
            });
            toggleAddForm(); saveSession(); renderAuditList();
            document.getElementById('add-hu').value = ""; document.getElementById('add-prod').value = "";
            document.getElementById('add-batch').value = ""; document.getElementById('add-qty').value = "";
        }
    </script>
</body>
</html>
