<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP Auditor | Floor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card-verified { border-left: 10px solid #10b981; background: linear-gradient(to right, #f0fdf4, #ffffff); }
        .card-missing { border-left: 10px solid #ef4444; background: #fef2f2; opacity: 0.7; }
        .card-extra { border-left: 10px solid #8b5cf6; background: #f5f3ff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); }
        #toast, #msg-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 400; pointer-events: none; opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #msg-notification { top: -100px; pointer-events: auto; }
        #msg-notification.show { top: 20px; opacity: 1; }
        .nav-active { background-color: #2563eb !important; color: white !important; }
        .row-progress-badge { font-size: 8px; background: #e2e8f0; padding: 2px 6px; border-radius: 99px; position: absolute; top: -5px; right: -5px; }
        .tag-both { background: #1e293b; color: #f8fafc; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col h-screen overflow-hidden">

    <div id="toast" class="bg-green-600 text-white px-6 py-3 rounded-full font-black text-xs uppercase shadow-2xl">Synced</div>
    <div id="msg-notification" onclick="switchView('report')" class="bg-blue-600 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-4 min-w-[280px] cursor-pointer">
        <div class="bg-white/20 p-2 rounded-lg text-lg">💬</div>
        <div><p id="msg-sender" class="text-[10px] font-black uppercase opacity-80 leading-none mb-1">Office</p><p id="msg-preview" class="text-xs font-bold leading-tight truncate max-w-[200px]">New message</p></div>
    </div>

    <header class="bg-slate-900 text-white px-4 py-3 shadow-2xl shrink-0 z-50">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3"><div class="bg-blue-600 p-2 rounded-xl">📦</div><h1 class="text-sm font-black uppercase tracking-tighter">SAP Auditor</h1></div>
            <button onclick="clearAllData()" class="bg-slate-800 text-slate-400 px-3 py-2 text-[10px] uppercase font-black border border-slate-700 rounded-lg">Reset</button>
        </div>
    </header>

    <nav class="bg-white border-b flex p-1.5 shrink-0 gap-1">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[10px] font-black uppercase nav-active rounded-xl">Audit Mode</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[10px] font-black uppercase text-slate-400 bg-slate-50 rounded-xl">Live Report</button>
    </nav>

    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        <div id="setup-screen" class="absolute inset-0 bg-slate-50 z-[60] flex flex-col p-6 overflow-y-auto">
            <div id="upload-prompt" class="flex-1 flex flex-col items-center justify-center text-center">
                <h2 class="text-3xl font-black uppercase text-slate-900 mb-2">Upload Data</h2>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="bg-blue-600 text-white py-6 px-12 rounded-3xl font-black uppercase text-sm shadow-xl cursor-pointer">Select Excel File</label>
            </div>
            <div id="row-selection" class="hidden">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-black uppercase text-slate-900">Select Row</h2>
                    <span id="total-progress" class="text-[10px] font-black text-blue-600 uppercase bg-blue-50 px-3 py-1 rounded-full">0 Bins Done</span>
                </div>
                <div class="grid grid-cols-4 gap-4" id="row-grid"></div>
            </div>
        </div>

        <div class="px-4 py-4 bg-white border-b shrink-0">
            <div class="flex gap-2">
                <button onclick="stepBin(-1)" class="bg-slate-100 text-slate-400 w-12 rounded-2xl">◀</button>
                <div class="flex-1 relative">
                    <input type="text" id="bin-input" placeholder="SCAN BIN..." class="w-full py-4 px-6 bg-slate-50 border-2 rounded-2xl text-xl mono text-blue-700 uppercase outline-none" onchange="selectBin(this.value)">
                    <span id="bin-status-badge" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-emerald-500 text-white text-[8px] font-black px-2 py-1 rounded-lg">✅ DONE</span>
                </div>
                <button onclick="stepBin(1)" class="bg-slate-100 text-slate-400 w-12 rounded-2xl">▶</button>
            </div>
        </div>

        <div id="audit-list" class="flex-1 overflow-y-auto p-4 space-y-4 pb-64"></div>

        <div class="fixed bottom-0 left-0 right-0 glass p-4 shadow-2xl z-50">
            <div class="flex gap-3 mb-4">
                <button onclick="toggleAddForm()" class="flex-1 bg-white border-2 border-orange-500 text-orange-600 py-4 rounded-2xl font-black uppercase text-[11px]">+ Found Item</button>
                <button onclick="leaveAisle()" class="flex-1 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center font-black uppercase text-[11px] gap-2 border border-slate-200">🚪 Leave Aisle</button>
            </div>
            <button onclick="finalizeBin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-xl">Finalize & Next Bin</button>
        </div>
    </main>

    <main id="view-report" class="hidden flex-1 flex flex-col overflow-hidden">
        <div class="bg-white border-b flex shrink-0 overflow-x-auto no-scrollbar">
            <button onclick="setReportTab('move')" id="tab-move" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase tab-btn-active">Movements</button>
            <button onclick="setReportTab('adj')" id="tab-adj" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase text-slate-400">Adjustments</button>
            <button onclick="setReportTab('inactive')" id="tab-inactive" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase text-slate-400">Inactive HUs</button>
            <button onclick="setReportTab('miss')" id="tab-miss" class="flex-1 min-w-[100px] py-4 text-[9px] font-black uppercase text-slate-400">Missing</button>
        </div>
        <div id="report-body" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="bg-white p-5 border-t space-y-4 shrink-0">
            <div id="mobile-chat" class="h-24 overflow-y-auto bg-slate-50 p-2 rounded-lg text-[10px] space-y-1 mb-2"></div>
            <div class="flex gap-2">
                <input type="text" id="email-user" placeholder="Name" class="w-20 p-2 bg-slate-50 rounded-lg text-xs outline-none">
                <input type="text" id="mobile-msg" placeholder="Chat..." class="flex-1 p-2 bg-slate-50 rounded-lg text-xs outline-none">
                <button onclick="sendMobileMsg()" class="bg-blue-600 text-white px-4 rounded-lg font-bold">↑</button>
            </div>
        </div>
    </main>

    <div id="add-item-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-5 shadow-2xl">
            <div class="flex justify-between items-center"><h2 class="text-2xl font-black uppercase">Physical Find</h2><span id="smart-fill-badge" class="hidden bg-green-100 text-green-600 text-[8px] font-black px-2 py-1 rounded-full animate-pulse uppercase">Smart Filled</span></div>
            <div class="space-y-4">
                <input type="text" id="add-hu" placeholder="HU (0 if Missing Label)" class="w-full p-4 bg-slate-50 border-2 rounded-2xl mono outline-none focus:border-blue-500" oninput="autoLookupExtra(this)">
                <div class="grid grid-cols-2 gap-3"><input type="text" id="add-prod" placeholder="Item #" class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none"><input type="text" id="add-batch" placeholder="Batch" class="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none"></div>
                <input type="number" id="add-qty" placeholder="Count" class="w-full p-6 bg-blue-50 rounded-2xl font-black text-center text-3xl text-blue-700 outline-none border-2 border-blue-100">
            </div>
            <div class="flex gap-3 pt-4"><button onclick="toggleAddForm()" class="flex-1 py-4 text-slate-400 font-black uppercase text-[10px]">Cancel</button><button onclick="submitExtra()" class="flex-[2] bg-orange-500 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Confirm Add</button></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw_huXZUnTzHzTbcdPLG8xga_bwgfsB6SS0wL_e6dyIiDSrKpaHYK4qikcoX-OhHNxg/exec";
        const ALL_SAP_BINS = ["B101","B102","B103","B104","B105","B106","B107","B108","B109","B110","B111","B112","B113","B114","CLARIFICATION","C_TRUCK","FA01A","FA01B","FA02A","FA02B","FA03A","FA03B","FA04A","FA04B","FA05A","FA05B","FA06A","FA06B","FA07A","FA07B","FA08A","FA08B","FB01A","FB01B","FB02A","FB02B","FB03A","FB03B","FB04A","FB04B","FB05A","FB05B","FB06A","FB06B","FB07A","FB07B","FB08A","FB08B","FC01A","FC01B","FC02A","FC02B","FC03A","FC03B","FC04A","FC04B","FC05A","FC05B","FC06A","FC06B","FC07A","FC07B","FB08A","FB08B","FD01A","FD01B","FD02A","FD02B","FD03A","FD03B","FD04A","FD04B","FD05A","FD05B","FD06A","FD06B","FD07A","FD07B","FD08A","FD08B","FD09A","FD09B","FD10A","FD10B","GR-PRODUCTION","GR-ZONE","GR-ZONE-SMALLPARC","KITS-FLOOR","MIXAREA1_HU_FIX","MIXAREA2_HU_FIX","PACKRM1_NHU","PACKRM2_NHU","PACKRM2_HU_FIX","PKG_RETURN","PRFL-01-02","PRFL-01-04","PSA-INTERMEDIATE","RECV-HOLD","RECV01","RECV02","RECV03","RECV04","RETURN-BLND-FLOOR","SIG-INSIDE-01","SIG-INSIDE-02","STG01","STG02","STG03","STG04","STG05","STG06","STG07","STG08","STG09","STG10","STG11","STG12","STG13","STG14","STG_RTN","VIRTUAL_BIN","VIRTUAL_FLUID_LOAD","VIRTUAL_RET_BIN"];
        const aisleConfigs = {A:36, B:38, C:38, D:38, E:38, F:38, G:38, H:38, J:37, K:12, L:34, M:35, N:24, P:6};
        Object.keys(aisleConfigs).forEach(char => { for(let i=0; i<=aisleConfigs[char]; i++){ const bay = i.toString().padStart(2,'0'); ALL_SAP_BINS.push(`W${char}${bay}A`,`W${char}${bay}B`,`W${char}${bay}C`); } ALL_SAP_BINS.push(`W${char}100`); });

        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = []; 
        let currentBinItems = [];
        let currentActiveBin = "";
        let activeReportTab = 'move';
        let lastMsgTime = 0;
        let cloudReport = [];

        function haptic() { if (window.navigator.vibrate) window.navigator.vibrate(40); }

        function handleFileUpload(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                sapMasterData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]).map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    batch: String(row['Batch'] || row['Batch Number'] || row['Charg'] || "").trim(),
                    desc: row['Product Short Description'] || row['Product short description'] || row['Description'] || "",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
                document.getElementById('upload-prompt').classList.add('hidden'); 
                document.getElementById('row-selection').classList.remove('hidden'); 
                initSetupGrid();
            };
            reader.readAsArrayBuffer(event.target.files[0]);
        }

        async function syncCloud() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                cloudReport = data.report || [];
                
                if (data.chat && data.chat.length > 0) {
                    const latest = data.chat[data.chat.length - 1];
                    const currentUser = document.getElementById('email-user').value || "Floor";
                    if (lastMsgTime !== 0 && latest.time > lastMsgTime && latest.user !== currentUser) {
                        haptic(); document.getElementById('msg-sender').innerText = latest.user; document.getElementById('msg-preview').innerText = latest.text;
                        document.getElementById('msg-notification').classList.add('show'); setTimeout(() => document.getElementById('msg-notification').classList.remove('show'), 5000);
                    }
                    lastMsgTime = latest.time;
                }
                document.getElementById('mobile-chat').innerHTML = data.chat.map(m => `<div><span class="font-black text-blue-600">${m.user}:</span> ${m.text}</div>`).join('');
                updateRowProgressUI();
                if(activeReportTab === 'move' || activeReportTab === 'adj' || activeReportTab === 'inactive' || activeReportTab === 'miss') renderReport();
            } catch(e){}
        }

        async function finalizeBin() {
            if(!currentActiveBin) return;
            haptic();
            if (currentBinItems.some(i => !i.verified && !i.isMissing)) { alert("Finish bin first."); return; }
            let itemsToLog = currentBinItems.length === 0 ? [{ hu: "EMPTY_BIN", product: "NONE", desc: "Confirmed Empty", batch: "", sapBin: "", scannedBin: currentActiveBin, sapQty: 0, countQty: 0, type: 'ok' }] : currentBinItems.map(i => {
                let type = 'ok';
                if (i.isMissing) type = 'miss';
                else if (i.isExtra && (!sapMasterData.some(m => m.hu === i.hu) || i.hu === "0")) type = 'inactive';
                else if (i.sapBin && i.scannedBin !== i.sapBin) type = 'move';
                else if (i.countQty !== i.sapQty) type = 'adj';
                return { hu: i.hu, product: i.product, desc: i.desc, batch: i.batch, sapBin: i.sapBin, scannedBin: i.scannedBin, sapQty: i.sapQty, countQty: i.countQty, type: type };
            });
            
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'logAudit', user: document.getElementById('email-user').value || "Floor", bin: currentActiveBin, items: itemsToLog }) });
            stepBin(1);
            syncCloud();
        }

        function stepBin(dir) {
            if (!currentActiveBin) return;
            const currentIdx = ALL_SAP_BINS.indexOf(currentActiveBin);
            if (currentIdx === -1) return;
            const nextIdx = currentIdx + dir;
            if (nextIdx < 0 || nextIdx >= ALL_SAP_BINS.length) return;
            const nextBin = ALL_SAP_BINS[nextIdx];
            const currentAisle = currentActiveBin.startsWith('W') ? currentActiveBin.charAt(1) : 'OTHER';
            const nextAisle = nextBin.startsWith('W') ? nextBin.charAt(1) : 'OTHER';
            if (dir > 0 && currentAisle !== nextAisle && currentAisle !== 'OTHER') {
                if (confirm(`Aisle ${currentAisle} Done! Move to ${nextAisle}?`)) selectBin(nextBin);
                else leaveAisle();
            } else { selectBin(nextBin); }
        }

        function selectBin(binName) {
            if (!binName) return;
            currentActiveBin = binName.toUpperCase();
            document.getElementById('bin-input').value = currentActiveBin;
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updatePosition', user: document.getElementById('email-user').value || "Floor", bin: currentActiveBin }) });
            
            const alreadyDone = new Set(cloudReport.map(i => i.scanBin)).has(currentActiveBin);
            document.getElementById('bin-status-badge').classList.toggle('hidden', !alreadyDone);
            
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin }));
            document.getElementById('setup-screen').classList.add('hidden');
            renderAuditList(); window.scrollTo(0,0);
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list'); container.innerHTML = "";
            if (currentBinItems.length === 0 && currentActiveBin !== "") { container.innerHTML = `<div class="py-20 text-center text-slate-300 font-black uppercase text-xs">Empty Bin</div>`; return; }
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div'); card.className = `p-5 rounded-[2rem] shadow-sm border bg-white transition-all ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : (item.isExtra ? 'card-extra' : ''))}`;
                card.innerHTML = `<div class="flex justify-between items-start mb-4"><div class="flex-1"><span class="inline-block px-3 py-1 bg-slate-900 text-blue-400 mono text-[10px] rounded-lg mb-2">HU: ${item.hu}</span><h3 class="text-sm font-black text-slate-800 leading-tight mb-1">${item.product}</h3><p class="text-[11px] text-slate-600 font-semibold mb-1">${item.desc}</p><p class="text-[10px] text-slate-500 font-bold uppercase">Batch: ${item.batch || 'N/A'}</p></div><div class="text-right bg-slate-50 p-2 rounded-xl border border-slate-100 min-w-[70px]"><p class="text-[7px] font-black text-slate-400 uppercase">SAP Qty</p><p class="text-lg mono font-black text-slate-700">${item.isExtra ? '--' : item.sapQty}</p></div></div><div class="flex flex-col gap-3"><div class="flex gap-2">${!item.isExtra ? `<button onclick="quickConfirm(${index})" class="flex-[3] py-4 bg-emerald-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg">Confirm ${item.sapQty}</button>` : ''}<button onclick="toggleMissing(${index})" class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase border-2 ${item.isMissing ? 'bg-red-600 border-red-600 text-white shadow-lg' : 'border-slate-100 text-slate-300 bg-white'}">Missing</button></div><div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-2xl border border-slate-100"><button onclick="adjustQty(${index}, -1)" class="w-14 h-14 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-slate-300">－</button><input type="number" value="${item.countQty || ''}" oninput="updateCount(${index}, this.value)" placeholder="0" class="flex-1 bg-transparent text-center font-black text-2xl text-blue-700 outline-none"><button onclick="adjustQty(${index}, 1)" class="w-14 h-14 flex items-center justify-center bg-white rounded-xl shadow-sm text-2xl font-black text-blue-600">＋</button></div></div>`;
                container.appendChild(card);
            });
        }

        function quickConfirm(idx) { haptic(); currentBinItems[idx].countQty = currentBinItems[idx].sapQty; currentBinItems[idx].verified = true; currentBinItems[idx].isMissing = false; renderAuditList(); }
        function adjustQty(idx, delta) { haptic(); let c = currentBinItems[idx].countQty || 0; currentBinItems[idx].countQty = Math.max(0, c + delta); currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0); if(currentBinItems[idx].verified) currentBinItems[idx].isMissing = false; renderAuditList(); }
        function updateCount(idx, val) { currentBinItems[idx].countQty = parseFloat(val) || 0; currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0); }
        function toggleMissing(idx) { haptic(); currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } renderAuditList(); }
        function switchView(view) { document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit'); document.getElementById('view-report').classList.toggle('hidden', view !== 'report'); const na = document.getElementById('nav-audit'), nr = document.getElementById('nav-report'); if (view === 'audit') { na.classList.add('nav-active'); na.classList.remove('text-slate-400', 'bg-slate-50'); nr.classList.remove('nav-active'); nr.classList.add('text-slate-400', 'bg-slate-50'); } else { nr.classList.add('nav-active'); nr.classList.remove('text-slate-400', 'bg-slate-50'); na.classList.remove('nav-active'); na.classList.add('text-slate-400', 'bg-slate-50'); renderReport(); } }
        function leaveAisle() { haptic(); currentActiveBin = ""; document.getElementById('setup-screen').classList.remove('hidden'); }
        function clearAllData() { if (confirm("Reset?")) { localStorage.clear(); location.reload(); } }
        function toggleAddForm() { haptic(); document.getElementById('add-item-modal').classList.toggle('hidden'); }
        async function sendMobileMsg() { const text = document.getElementById('mobile-msg').value; const user = document.getElementById('email-user').value || "Floor"; if (!text) return; await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'sendMessage', user, text }) }); document.getElementById('mobile-msg').value = ""; syncCloud(); }
        function initSetupGrid() { const grid = document.getElementById('row-grid'); grid.innerHTML = ""; "ABCDEFGHIJKLMNOP".split("").forEach(row => { const btn = document.createElement('button'); btn.className = "relative bg-white border-2 border-slate-100 p-5 rounded-2xl font-black text-xl active:bg-blue-600 active:text-white"; btn.innerHTML = `${row}<span id="row-badge-${row}" class="row-progress-badge">0</span>`; btn.onclick = () => { haptic(); selectBin(`W${row}00A`); }; grid.appendChild(btn); }); }
        function updateRowProgressUI() { const finalized = new Set(cloudReport.map(i => i.scanBin)); "ABCDEFGHIJKLMNOP".split("").forEach(row => { const badge = document.getElementById(`row-badge-${row}`); if (badge) badge.innerText = Array.from(finalized).filter(b => b && b.charAt(1) === row).length; }); document.getElementById('total-progress').innerText = `${finalized.size} Bins Done`; }
        function autoLookupExtra(input) { const hu = input.value.trim(); if (hu === "0" || hu.length < 8) return; const match = sapMasterData.find(i => i.hu === hu); if (match) { haptic(); document.getElementById('add-prod').value = match.product; document.getElementById('add-batch').value = match.batch || ""; } }
        function submitExtra() { const hu = document.getElementById('add-hu').value.trim(); const prod = document.getElementById('add-prod').value.trim(); const batch = document.getElementById('add-batch').value.trim(); const qty = parseFloat(document.getElementById('add-qty').value) || 0; if(!hu || qty <= 0) return; const sapMatch = sapMasterData.find(m => m.hu === hu); currentBinItems.push({ hu, product: prod, batch, sapQty: sapMatch ? sapMatch.sapQty : 0, sapBin: sapMatch ? sapMatch.sapBin : null, scannedBin: currentActiveBin, countQty: qty, verified: true, isMissing: false, isExtra: true, desc: sapMatch ? sapMatch.desc : (hu === "0" ? "LABEL MISSING" : "PHYSICAL FIND") }); toggleAddForm(); renderAuditList(); document.getElementById('add-hu').value = ""; document.getElementById('add-prod').value = ""; document.getElementById('add-batch').value = ""; document.getElementById('add-qty').value = ""; }
        
        function renderReport() {
            const container = document.getElementById('report-body'); container.innerHTML = "";
            const foundHUs = new Set(cloudReport.filter(i => i.type !== 'miss').map(i => i.hu));
            let displayList = [];
            if (activeReportTab === 'move') displayList = cloudReport.filter(i => i.hu !== "0" && i.sapBin !== "null" && i.scanBin !== i.sapBin && i.type !== 'miss');
            else if (activeReportTab === 'adj') displayList = cloudReport.filter(i => i.scanQty !== i.sapQty && i.type !== 'miss');
            else if (activeReportTab === 'inactive') displayList = cloudReport.filter(i => i.type === 'inactive');
            else if (activeReportTab === 'miss') displayList = cloudReport.filter(i => i.type === 'miss' && !foundHUs.has(i.hu));

            if(displayList.length === 0) { container.innerHTML = `<div class="py-20 text-center font-black uppercase text-slate-300 tracking-widest text-[10px]">No Discrepancies</div>`; return; }
            displayList.forEach(i => {
                const div = document.createElement('div'); div.className = "p-4 bg-white rounded-2xl border border-slate-100 shadow-sm";
                div.innerHTML = `<p class="text-[10px] font-black mono text-blue-600">HU: ${i.hu}</p><p class="text-xs font-bold leading-tight">${i.prod}</p><p class="text-[10px] text-slate-500 mb-1">${i.desc}</p><p class="text-[10px] uppercase font-black">${i.type === 'move' ? 'Moved: ' + i.sapBin + ' → ' + i.scanBin : 'Qty: ' + i.scanQty + ' (SAP: ' + i.sapQty + ')'}</p>`;
                container.appendChild(div);
            });
        }

        window.onload = () => { if (sapMasterData.length > 0) { document.getElementById('upload-prompt').classList.add('hidden'); document.getElementById('row-selection').classList.remove('hidden'); initSetupGrid(); } syncCloud(); setInterval(syncCloud, 5000); };
    </script>
</body>
</html>
