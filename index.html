<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Auditor | Novus Foods Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .row-verified { background-color: #f0fdf4 !important; border-left: 6px solid #22c55e; }
        .row-missing { background-color: #fef2f2 !important; border-left: 6px solid #ef4444; opacity: 0.8; }
        .row-extra { background-color: #fff7ed !important; border-left: 6px solid #f97316; }
        .row-error { border: 2px solid #ef4444 !important; animation: shake 0.2s ease-in-out 0s 2; }
        .nav-tab-active { background-color: #3b82f6; color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .report-filter-active { border-bottom: 3px solid #3b82f6; color: #1e40af; font-weight: 800; }
        input:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.4); }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(5px); } 50% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 flex flex-col h-screen overflow-hidden text-sm">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 shadow-xl shrink-0 no-print">
        <div class="max-w-[1800px] mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                </div>
                <h1 class="text-xl font-black uppercase tracking-tighter">SAP Auditor</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <input type="file" id="sap-upload" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-bold cursor-pointer transition-all text-xs shadow-lg uppercase whitespace-nowrap">Load SAP Data</label>
                <button onclick="clearAllData()" class="bg-slate-800 border border-slate-700 text-slate-400 px-4 py-2 rounded-lg hover:bg-red-700 hover:text-white transition-all font-bold uppercase text-[10px]">Reset Session</button>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white border-b flex justify-center p-1 no-print shrink-0">
        <div class="flex bg-slate-100 p-1 rounded-xl w-full max-w-md shadow-inner">
            <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-2 rounded-lg font-bold text-xs transition-all nav-tab-active uppercase">Audit Mode</button>
            <button id="nav-report" onclick="switchView('report')" class="flex-1 py-2 rounded-lg font-bold text-xs transition-all text-slate-400 hover:text-white uppercase">Discrepancy Report</button>
        </div>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 max-w-[1800px] mx-auto w-full flex flex-col gap-4 p-4 overflow-hidden">
        <div class="bg-white p-5 rounded-2xl shadow-lg border border-slate-200 flex items-end gap-6 shrink-0">
            <div class="flex-1 max-w-sm">
                <label class="block text-[10px] font-black uppercase text-slate-400 mb-1 tracking-widest">Active Storage Bin</label>
                <input type="text" id="bin-input" placeholder="Scan or Type Bin..." class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl text-2xl font-black text-blue-700 uppercase focus:border-blue-500 outline-none transition-all">
            </div>
            <div class="flex gap-4">
                <div class="text-center bg-slate-50 px-6 py-2 rounded-xl border"><p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Expected</p><p id="stat-expected" class="text-xl font-black">0</p></div>
                <div class="text-center bg-blue-50 px-6 py-2 rounded-xl border border-blue-100"><p class="text-[10px] text-blue-400 font-bold uppercase tracking-tight">Bins Done</p><p id="stat-bins-done" class="text-xl font-black text-blue-600">0</p></div>
            </div>
        </div>

        <div class="flex-1 bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col relative">
            <div class="overflow-y-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 sticky top-0 z-10 border-b">
                        <tr class="text-[10px] uppercase font-black text-slate-500 tracking-widest">
                            <th class="p-4 w-12 text-center">Found</th><th class="p-4 w-12 text-center">Missing</th><th class="p-4">HU</th><th class="p-4">Product</th><th class="p-4 w-28">Batch</th><th class="p-4 w-16 text-center">UoM</th><th class="p-4 w-24 text-center">SAP Qty</th><th class="p-4 w-32 text-center bg-blue-50/50">Count Qty</th><th class="p-4 w-12 text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="audit-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>

            <div class="p-4 bg-slate-900 border-t">
                <div class="flex flex-wrap md:flex-nowrap gap-3">
                    <input type="text" id="add-hu" placeholder="Extra HU Number" class="flex-1 p-3 rounded-lg bg-slate-800 border border-slate-700 text-white font-bold focus:border-blue-500 outline-none" oninput="autoLookupExtra(this)">
                    <input type="text" id="add-prod" placeholder="Product ID" class="flex-1 p-3 rounded-lg bg-slate-800 border border-slate-700 text-white font-bold focus:border-blue-500 outline-none">
                    <input type="text" id="add-batch" placeholder="Batch" class="w-28 p-3 rounded-lg bg-slate-800 border border-slate-700 text-white focus:border-blue-500 outline-none">
                    <input type="text" id="add-uom" placeholder="UoM" class="w-20 p-3 rounded-lg bg-slate-800 border border-slate-700 text-white font-bold text-center focus:border-blue-500 outline-none">
                    <input type="number" id="add-qty" placeholder="Qty" class="w-24 p-3 rounded-lg bg-slate-800 border border-slate-700 text-white font-black text-center focus:border-blue-500 outline-none">
                    <button onclick="submitExtra()" class="bg-orange-600 hover:bg-orange-500 text-white px-8 rounded-lg font-bold transition-all shadow-lg whitespace-nowrap uppercase text-xs">Add to Bin</button>
                </div>
            </div>
            
            <div class="p-4 bg-white border-t flex justify-end items-center gap-6">
                <p id="validation-msg" class="text-xs font-bold text-red-600 uppercase hidden">⚠️ Complete all counts before finalizing</p>
                <button onclick="finalizeBin()" class="bg-green-600 hover:bg-green-500 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition-all uppercase tracking-widest text-sm">Finalize Bin Audit</button>
            </div>
        </div>
    </main>

    <!-- REPORT VIEW -->
    <main id="view-report" class="hidden flex-1 max-w-[1800px] mx-auto w-full flex flex-col p-4 overflow-hidden">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 flex-1 flex flex-col overflow-hidden">
            <div class="flex bg-white border-b no-print shrink-0" id="report-filters">
                <button onclick="filterReport('move')" class="p-4 text-xs font-bold uppercase tracking-widest report-filter-active" id="f-move">Movements</button>
                <button onclick="filterReport('adj')" class="p-4 text-xs font-bold uppercase tracking-widest" id="f-adj">Adjustments</button>
                <button onclick="filterReport('inactive')" class="p-4 text-xs font-bold uppercase tracking-widest" id="f-inactive">Inactive HUs</button>
                <button onclick="filterReport('missing')" class="p-4 text-xs font-bold uppercase tracking-widest" id="f-missing">Missing Items</button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 text-[10px] font-black uppercase text-slate-500 border-b sticky top-0">
                        <tr><th class="p-4 text-xs">HU</th><th class="p-4 text-xs">Product</th><th class="p-4 text-xs text-blue-600">SAP Bin</th><th class="p-4 text-xs text-orange-600">Found In</th><th class="p-4 text-xs text-center">SAP Qty</th><th class="p-4 text-xs text-center">Count</th></tr>
                    </thead>
                    <tbody id="report-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            
            <!-- EMAIL SECTION -->
            <div class="p-4 bg-slate-50 border-t flex flex-wrap items-center justify-between gap-4 no-print">
                <div class="flex items-center gap-2">
                    <input type="text" id="email-user" placeholder="username" class="p-2 border rounded bg-white font-bold text-blue-700 outline-none w-40">
                    <span class="font-bold text-slate-500">@novusfoods.com</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="sendEmailReport()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-all shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        Email Report
                    </button>
                    <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase shadow-md">Print PDF</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DATA STATE ---
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);
        let currentFilter = 'move';

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
        }

        window.onload = () => {
            if (sapMasterData.length > 0) {
                document.getElementById('data-status').innerText = `ONLINE: ${sapMasterData.length} RECORDS`;
                document.getElementById('data-status').className = "text-[10px] text-green-500 font-black uppercase px-2";
            }
            if (currentActiveBin) { document.getElementById('bin-input').value = currentActiveBin; renderAuditTable(); }
            document.getElementById('stat-bins-done').innerText = binsAudited.size;
        };

        function clearAllData() { if(confirm("Clear all progress?")){ localStorage.clear(); location.reload(); } }

        // --- EMAIL LOGIC ---
        function sendEmailReport() {
            const user = document.getElementById('email-user').value.trim();
            if (!user) return alert("Please enter your Novus Foods username.");
            
            const combined = [...auditLog, ...currentBinItems];
            const foundHUs = new Set(combined.filter(i => i.verified).map(i => i.hu));
            
            const moves = combined.filter(i => i.sapBin && i.sapBin !== i.scannedBin && i.verified);
            const adjs = combined.filter(i => i.sapBin === i.scannedBin && i.countQty !== i.sapQty && !i.isMissing && i.verified);
            const ghost = combined.filter(i => i.sapBin === null);
            const miss = combined.filter(i => (i.isMissing || (!i.verified && !i.isExtra)) && !foundHUs.has(i.hu));

            let body = "SAP INVENTORY AUDIT DISCREPANCY REPORT\n";
            body += "========================================\n\n";

            const addSection = (title, data) => {
                if (data.length === 0) return "";
                let s = `[ ${title.toUpperCase()} ]\n`;
                data.forEach(i => {
                    s += `HU: ${i.hu} | Prod: ${i.product} | SAP Bin: ${i.sapBin || 'N/A'} | Found In: ${i.scannedBin} | SAP Qty: ${i.sapQty} | Count: ${i.countQty}\n`;
                });
                return s + "\n";
            };

            body += addSection("Movements Needed", moves);
            body += addSection("Quantity Adjustments", adjs);
            body += addSection("Inactive / Loose HUs", ghost);
            body += addSection("Missing Items", miss);

            const mailtoUrl = `mailto:${user}@novusfoods.com?subject=Inventory Discrepancy Report - ${new Date().toLocaleDateString()}&body=${encodeURIComponent(body)}`;
            window.location.href = mailtoUrl;
        }

        // --- AUDIT LOGIC ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    desc: row['Product Short Description'] || "",
                    batch: String(row['Batch'] || ""),
                    uom: row['Base Unit of Measure'] || row['UoM'] || "EA",
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                saveSession(); location.reload();
            };
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('bin-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const binVal = e.target.value.trim().toUpperCase();
                if(!binVal) return;
                currentActiveBin = binVal;
                const expected = sapMasterData.filter(i => i.sapBin === binVal);
                currentBinItems = expected.map(i => ({ ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: binVal }));
                saveSession(); renderAuditTable();
            }
        });

        function renderAuditTable() {
            const tbody = document.getElementById('audit-body');
            tbody.innerHTML = "";
            if (currentBinItems.length === 0 && currentActiveBin !== "") {
                tbody.innerHTML = `<tr><td colspan="9" class="p-12 text-center text-slate-400 italic font-medium bg-slate-50/50 text-xs uppercase tracking-widest">SAP Systematic record: Bin is empty. Add physical items below.</td>`;
            }
            currentBinItems.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = item.verified ? 'row-verified' : (item.isMissing ? 'row-missing' : (item.isExtra ? 'row-extra' : ''));
                tr.innerHTML = `
                    <td class="p-4 text-center"><input type="checkbox" class="w-5 h-5 accent-green-600" ${item.verified ? 'checked' : ''} onchange="toggleFound(${index})"></td>
                    <td class="p-4 text-center"><input type="checkbox" class="w-5 h-5 accent-red-600" ${item.isMissing ? 'checked' : ''} onchange="toggleMissing(${index})"></td>
                    <td class="p-4 font-mono font-bold text-slate-600">${item.hu}</td>
                    <td class="p-4 font-bold text-slate-800">${item.product}<div class="text-[9px] text-slate-400 uppercase font-normal">${item.desc}</div></td>
                    <td class="p-4 text-xs font-medium text-slate-400 text-center">${item.batch || '---'}</td>
                    <td class="p-4 text-center text-[10px] font-bold text-slate-500">${item.uom}</td>
                    <td class="p-4 text-center font-bold text-slate-400">${item.isExtra ? '--' : item.sapQty}</td>
                    <td class="p-4 bg-blue-50/30"><input type="number" id="qty-input-${index}" value="${item.countQty || ''}" oninput="updateCount(${index}, this.value)" class="w-full p-2 border-2 border-blue-100 rounded-lg text-center font-black text-blue-700 outline-none shadow-sm" ${item.isMissing ? 'disabled' : ''}></td>
                    <td class="p-4 text-center"><button onclick="removeRow(${index})" class="text-slate-300 hover:text-red-500 transition-colors">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('stat-expected').innerText = currentBinItems.filter(i => !i.isExtra).length;
            document.getElementById('validation-msg').classList.add('hidden');
        }

        function submitExtra() {
            const hu = document.getElementById('add-hu').value.trim();
            const prod = document.getElementById('add-prod').value.trim();
            const batch = document.getElementById('add-batch').value.trim();
            const uom = document.getElementById('add-uom').value.trim() || "EA";
            const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            if(!currentActiveBin || !hu || !prod || qty <= 0) return alert("HU, Product, and Quantity are required.");
            const sapMatch = sapMasterData.find(i => i.hu === hu);
            const description = (hu === "0") ? "Missing/non-visible HU" : (sapMatch ? sapMatch.desc : "GHOST HU");
            currentBinItems.push({ hu, product: prod, batch, uom, sapQty: sapMatch?sapMatch.sapQty:0, sapBin: sapMatch?sapMatch.sapBin:null, scannedBin: currentActiveBin, countQty: qty, verified: true, isMissing: false, isExtra: true, desc: description });
            ['add-hu', 'add-prod', 'add-batch', 'add-uom', 'add-qty'].forEach(id => document.getElementById(id).value = "");
            saveSession(); renderAuditTable();
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            let errors = false;
            currentBinItems.forEach((item, index) => {
                const inputEl = document.getElementById(`qty-input-${index}`);
                if (item.verified && (item.countQty <= 0 || isNaN(item.countQty))) { inputEl.classList.add('row-error'); errors = true; }
                if (!item.verified && !item.isMissing) { inputEl.closest('tr').classList.add('row-error'); errors = true; }
            });
            if (errors) { document.getElementById('validation-msg').classList.remove('hidden'); return; }
            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            currentBinItems = []; currentActiveBin = "";
            document.getElementById('bin-input').value = ""; document.getElementById('bin-input').focus();
            document.getElementById('stat-bins-done').innerText = binsAudited.size;
            saveSession(); renderAuditTable();
        }

        function toggleFound(idx) { currentBinItems[idx].verified = !currentBinItems[idx].verified; if (currentBinItems[idx].verified) currentBinItems[idx].isMissing = false; saveSession(); renderAuditTable(); }
        function toggleMissing(idx) { currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } saveSession(); renderAuditTable(); }
        function updateCount(idx, val) { currentBinItems[idx].countQty = parseFloat(val) || 0; if(currentBinItems[idx].countQty > 0) { currentBinItems[idx].verified = true; currentBinItems[idx].isMissing = false; } saveSession(); }
        function removeRow(idx) { currentBinItems.splice(idx, 1); saveSession(); renderAuditTable(); }
        function switchView(view) {
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-tab-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-tab-active', view === 'report');
            if(view === 'report') filterReport(currentFilter);
        }

        function filterReport(type) {
            currentFilter = type;
            const tbody = document.getElementById('report-body');
            tbody.innerHTML = "";
            document.querySelectorAll('#report-filters button').forEach(b => b.classList.remove('report-filter-active'));
            document.getElementById(`f-${type}`).classList.add('report-filter-active');
            const combined = [...auditLog, ...currentBinItems];
            const foundHUs = new Set(combined.filter(i => i.verified).map(i => i.hu));
            let filtered = [];
            if (type === 'move') filtered = combined.filter(i => i.sapBin && i.sapBin !== i.scannedBin && i.verified);
            else if (type === 'adj') filtered = combined.filter(i => i.sapBin === i.scannedBin && i.countQty !== i.sapQty && !i.isMissing && i.verified);
            else if (type === 'inactive') filtered = combined.filter(i => i.sapBin === null);
            else if (type === 'missing') filtered = combined.filter(i => (i.isMissing || (!i.verified && !i.isExtra)) && !foundHUs.has(i.hu));
            if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center text-slate-300 italic uppercase font-bold">No records found</td></tr>`; return; }
            filtered.forEach(i => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-4 font-mono text-xs font-bold">${i.hu}</td><td class="p-4 text-xs font-bold">${i.product}</td><td class="p-4 text-[10px] uppercase text-slate-500 font-medium">${i.desc}</td><td class="p-4 text-xs font-bold text-blue-600">${i.sapBin||'---'}</td><td class="p-4 text-xs font-bold text-orange-600">${i.scannedBin}</td><td class="p-4 text-xs text-center">${i.sapQty}</td><td class="p-4 text-xs text-center font-bold">${i.countQty}</td>`;
                tbody.appendChild(tr);
            });
        }

        function autoLookupExtra(input) {
            const hu = input.value.trim();
            if (hu.length >= 8) {
                const match = sapMasterData.find(i => i.hu === hu);
                if (match) {
                    document.getElementById('add-prod').value = match.product;
                    document.getElementById('add-batch').value = match.batch;
                    document.getElementById('add-uom').value = match.uom;
                    document.getElementById('add-qty').focus();
                }
            }
        }
    </script>
</body>
</html>
